[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Frontend calls /api/news in dev and production alike.
[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[edge_functions]]
  function = "daily-og"
  path = "/"
