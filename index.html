<html lang="si">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3A0D0D" />
    <meta
      name="description"

    <meta property="og:site_name" content="Ada Litha" />
    <meta property="og:title" content="අද ලිත · Ada Litha — Today's Sri Lankan Almanac" />

      property="og:description"
      content="Poya, moon phase, Rahu Kalaya, sunrise and sunset — Sri Lanka time, wherever you are."
    />
    <meta property="og:url" content="https://adalitha.lk/" />
    <meta property="og:image" content="https://adalitha.lk/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load font CSS asynchronously so it never blocks first paint; with
         display=swap, text renders immediately in a fallback then swaps. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Tamil:wght@400;500;600&family=Noto+Serif+Sinhala:wght@400;500;600;700;900&display=swap"
      crossorigin="anonymous"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Tamil:wght@400;500;600&family=Noto+Serif+Sinhala:wght@400;500;600;700;900&display=swap"
